      - invoice_number
      - amount
      - customer
      - currency
      - due_date
    tags:
      - retrieval
      - erp
      - metadata

  - key: Invoice Amount
    query_template:
        - "What is the invoice amount in {filename}?"
    fields:
        - invoice_number
        - amount
        - customer
        - currency
        - due_date
    tags:
      - retrieval
      - erp
      - metadata

  - key: Invoice Currency
    query_template:
        - "Which currency is used in {filename}?"
    fields:
        - invoice_number
        - amount
        - customer
        - currency
        - due_date
    tags:
      - retrieval
      - erp
      - metadata
  - key: Invoice Supplier
    query_template:
        - "Who issued {filename}?"
    fields:
        - invoice_number
        - amount
        - customer
        - currency
        - due_date
    tags:
      - retrieval
      - erp
      - metadata
  - key: Invoice Customer
    query_template:
        - "Who is the customer on {filename}?"
    fields:
        - invoice_number
        - amount
        - customer
        - currency
        - due_date
    tags:
      - retrieval
      - erp
      - metadata

